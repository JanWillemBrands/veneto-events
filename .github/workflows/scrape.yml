name: Scrape Veneto Events

on:
  schedule:
    # Run twice daily at 6:00 and 18:00 UTC
    - cron: "0 6,18 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrapers and generate RSS
        run: python generate_feed.py

      - name: Commit and push updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/events.rss
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update events feed [automated]"
            git push
          fi
